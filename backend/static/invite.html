<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Invitación — Piano Virtual</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;background:#0a0a1a;color:#e0e0e0;overflow-x:hidden;line-height:1.6;min-height:100vh;display:flex;align-items:center;justify-content:center}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 50% 30%,rgba(74,108,247,0.1) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(255,160,50,0.05) 0%,transparent 50%),linear-gradient(180deg,#0a0a1a 0%,#111133 50%,#0a0a1a 100%)}
.card{position:relative;z-index:1;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:48px 40px;max-width:420px;width:90%;text-align:center;backdrop-filter:blur(8px)}
.icon{font-size:64px;margin-bottom:16px;display:block}
h1{font-size:1.6rem;font-weight:800;background:linear-gradient(135deg,#4a6cf7,#ffa032);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
p{color:#8888b0;font-size:0.95rem;margin-bottom:24px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;border-radius:12px;font-size:1rem;font-weight:700;transition:transform .2s,box-shadow .2s;border:none;cursor:pointer;text-decoration:none;margin:4px}
.btn-primary{background:linear-gradient(135deg,#4a6cf7,#6a4cf7);color:#fff;width:100%;justify-content:center}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(74,108,247,.35)}
.btn-secondary{background:rgba(255,255,255,.06);color:#e0e0e0;border:1px solid rgba(255,255,255,.08);padding:10px 20px;font-size:.85rem}
.btn-secondary:hover{background:rgba(255,255,255,.1)}
.downloads{display:none;margin-top:20px;padding-top:20px;border-top:1px solid rgba(255,255,255,.06)}
.downloads.show{display:block}
.downloads p{font-size:0.8rem;color:#666;margin-bottom:12px}
.status{font-size:0.85rem;color:#8888b0;margin-top:16px;min-height:24px}
.status .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.1);border-top-color:#4a6cf7;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="bg"></div>
<div class="card">
  <span class="icon">🎹</span>
  <h1>Invitación a Piano Virtual</h1>
  <p>Un amigo te ha invitado a practicar piano juntos. Abre la app para aceptar.</p>
  <button class="btn btn-primary" id="openBtn">Abrir Piano Virtual</button>
  <div class="status" id="status"><span class="spinner"></span>Intentando abrir la app...</div>
  <div class="downloads" id="downloads">
    <p>¿No tienes la app? Descárgala:</p>
    <a class="btn btn-secondary" id="dlWindows" href="#">Windows</a>
    <a class="btn btn-secondary" id="dlAndroid" href="#">Android</a>
  </div>
</div>
<script>
const code = window.location.pathname.replace('/invite/', '').replace(/\/$/, '') || '';
const API = `${window.location.protocol}//${window.location.host}`;
const openBtn = document.getElementById('openBtn');
const statusEl = document.getElementById('status');
const downloads = document.getElementById('downloads');

function fallback() {
  statusEl.innerHTML = 'No se pudo abrir la app automáticamente.';
  downloads.classList.add('show');
  fetch(`${API}/api/app-info`).then(r=>r.json()).then(info => {
    const p = info.platforms || {};
    document.getElementById('dlWindows').href = p.windows?.url || '#';
    document.getElementById('dlAndroid').href = p.android?.url || '#';
  }).catch(()=>{});
}

function tryOpenApp() {
  statusEl.innerHTML = '<span class="spinner"></span>Intentando abrir la app...';
  downloads.classList.remove('show');
  const url = `pianovirtual://add-friend/${code}`;
  const timeout = setTimeout(fallback, 2000);
  window.addEventListener('blur', () => { clearTimeout(timeout); statusEl.innerHTML = '¡App abierta!'; });
  window.location = url;
}

openBtn.addEventListener('click', tryOpenApp);
tryOpenApp();
</script>
</body>
</html>
