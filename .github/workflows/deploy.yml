name: Deploy backend

on:
  push:
    branches: [master]
    paths:
      - "backend/**"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:

env:
  CARGO_TERM_COLORS: always

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Build release
        run: cargo build --release -p piano-backend
        working-directory: backend

      - name: Install sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

      - name: Copy binary via SCP
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e scp \
            -o StrictHostKeyChecking=no \
            -P ${{ secrets.SSH_PORT || '22' }} \
            target/release/piano-backend \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/piano-virtual/piano-virtual/piano-backend

      - name: Copy static folder via SCP
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e ssh \
            -o StrictHostKeyChecking=no \
            -p ${{ secrets.SSH_PORT || '22' }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "mkdir -p /home/piano-virtual/piano-virtual/static/img"
          sshpass -e scp \
            -o StrictHostKeyChecking=no \
            -P ${{ secrets.SSH_PORT || '22' }} \
            -r backend/static/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/piano-virtual/piano-virtual/static/

      - name: Copy apps folder via SCP
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e ssh \
            -o StrictHostKeyChecking=no \
            -p ${{ secrets.SSH_PORT || '22' }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "mkdir -p /home/piano-virtual/piano-virtual/apps"
          sshpass -e scp \
            -o StrictHostKeyChecking=no \
            -P ${{ secrets.SSH_PORT || '22' }} \
            -r backend/apps/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/piano-virtual/piano-virtual/apps/

      - name: Restart service via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT || '22' }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            chmod +x /home/piano-virtual/piano-virtual/piano-backend
            cd /home/piano-virtual/piano-virtual/
            # Mata el proceso si está corriendo
            pkill -x piano-backend 2>/dev/null || true
            echo "✅ Proceso terminado. El sitio se reiniciará automáticamente."
            # Opcional: verificar que el proceso se haya reiniciado después de unos segundos
            sleep 6
            if pgrep -f piano-backend > /dev/null; then
              echo "✅ La aplicación está corriendo."
            else
              echo "⚠️ No se encontró el proceso. Iniciándolo manualmente..."
              nohup /home/piano-virtual/piano-virtual/piano-backend >> /home/piano-virtual/piano-virtual/app.log 2>&1 &
            fi
