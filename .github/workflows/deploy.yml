name: Deploy backend

on:
  push:
    branches: [master]
    paths:
      - "backend/**"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:

env:
  CARGO_TERM_COLORS: always

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Build release
        run: cargo build --release -p piano-backend
        working-directory: backend

      - name: Install sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

      - name: Copy binary via SCP
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e scp \
            -o StrictHostKeyChecking=no \
            -P ${{ secrets.SSH_PORT || '22' }} \
            target/release/piano-backend \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/piano-virtual/piano-backend

      - name: Restart service via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT || '22' }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            chmod +x /home/piano-virtual/piano-backend
            systemctl --user daemon-reload 2>/dev/null || true
            systemctl --user restart piano-backend 2>/dev/null || sudo systemctl restart piano-backend 2>/dev/null || true
            echo "Servicio reiniciado"
