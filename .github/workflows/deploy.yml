name: Deploy backend

on:
  push:
    branches: [master]
    paths:
      - "backend/**"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:

env:
  CARGO_TERM_COLORS: always

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Build release
        run: cargo build --release -p piano-backend
        working-directory: backend

      - name: Install sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

      - name: Debug server paths
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e ssh \
            -o StrictHostKeyChecking=no \
            -p ${{ secrets.SSH_PORT || '22' }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "whoami; pwd; ls -la /home/piano-virtual/ 2>&1 || echo 'no existe'; ls -la /home/piano-virtual/piano-virtual/ 2>&1 || echo 'no existe'"

      - name: Copy binary via SCP
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e scp \
            -o StrictHostKeyChecking=no \
            -P ${{ secrets.SSH_PORT || '22' }} \
            target/release/piano-backend \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/piano-backend-new

      - name: Copy static folder via SCP
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e ssh \
            -o StrictHostKeyChecking=no \
            -p ${{ secrets.SSH_PORT || '22' }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "mkdir -p /home/piano-virtual/piano-virtual/static/img"
          sshpass -e ssh \
            -o StrictHostKeyChecking=no \
            -p ${{ secrets.SSH_PORT || '22' }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "rm -rf /home/piano-virtual/piano-virtual/static"
          sshpass -e scp \
            -o StrictHostKeyChecking=no \
            -P ${{ secrets.SSH_PORT || '22' }} \
            -r backend/static \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/piano-virtual/piano-virtual/static

      - name: Copy apps folder via SCP
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e ssh \
            -o StrictHostKeyChecking=no \
            -p ${{ secrets.SSH_PORT || '22' }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "rm -rf /home/piano-virtual/piano-virtual/apps"
          sshpass -e scp \
            -o StrictHostKeyChecking=no \
            -P ${{ secrets.SSH_PORT || '22' }} \
            -r backend/apps \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/piano-virtual/piano-virtual/apps

      - name: Restart service via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT || '22' }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            mkdir -p /home/piano-virtual/piano-virtual
            mv -f ~/piano-backend-new /home/piano-virtual/piano-virtual/piano-backend 2>/dev/null || cp -f ~/piano-backend-new /home/piano-virtual/piano-virtual/piano-backend
            chmod +x /home/piano-virtual/piano-virtual/piano-backend
            pkill -x piano-backend 2>/dev/null || true
            sleep 2
            cd /home/piano-virtual/piano-virtual/
            echo "Iniciando piano-backend..."
            nohup /home/piano-virtual/piano-virtual/piano-backend >> /home/piano-virtual/piano-virtual/app.log 2>&1 &
            sleep 4
            if pgrep -f piano-backend > /dev/null; then
              echo "✅ La aplicación está corriendo."
            else
              echo "⚠️ Fallo al iniciar."
            fi
